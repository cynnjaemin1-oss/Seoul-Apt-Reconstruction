function StageProgress({ stage }) {
  return (
    <div className="flex items-center gap-0.5">
      {STAGES.map((s, i) => (
        <div key={i} className="flex items-center gap-0.5 flex-1">
          <div className={`relative flex-1 h-2 rounded-full ${i <= stage ? s.color : 'bg-gray-200'} transition-all`}>
            {i === stage && (
              <span className="absolute -top-5 left-1/2 -translate-x-1/2 text-[9px] font-bold whitespace-nowrap text-blue-600 pulse-slow">
                ▼현재
              </span>
            )}
          </div>
          {i < STAGES.length - 1 && (
            <div className={`w-0.5 h-2 ${i < stage ? s.color : 'bg-gray-200'}`} />
          )}
        </div>
      ))}
    </div>
  );
}

function StageBadge({ stage }) {
  const s = STAGES[stage];
  return (
    <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold ${s.color} text-white badge-glow`}>
      {s.short}
    </span>
  );
}

function PriceBar({ low, mid, high }) {
  const max = Math.max(high * 1.1, 100);
  return (
    <div className="relative h-4 bg-gray-100 rounded-full overflow-hidden">
      <div
        className="absolute h-full bg-gradient-to-r from-blue-200 to-blue-400 rounded-full"
        style={{ left: `${(low / max) * 100}%`, width: `${((high - low) / max) * 100}%` }}
      />
      <div
        className="absolute h-full w-1 bg-blue-700 rounded-full"
        style={{ left: `${(mid / max) * 100}%` }}
      />
    </div>
  );
}

function SummaryCard({ label, value, sub, color }) {
  return (
    <div className={`rounded-2xl p-4 ${color}`}>
      <div className="text-xs font-medium opacity-70 mb-1">{label}</div>
      <div className="text-2xl font-bold">{value}</div>
      {sub && <div className="text-xs opacity-60 mt-0.5">{sub}</div>}
    </div>
  );
}

function PipelineView({ complexes, onSelect, selectedId }) {
  return (
    <div className="bg-white rounded-2xl border border-gray-100 p-4">
      <div className="text-sm font-bold text-gray-700 mb-4">📊 사업 단계별 현황</div>
      <div className="space-y-3">
        {STAGES.map((s, stageIdx) => {
          const items = complexes.filter(c => c.stage === stageIdx);
          if (items.length === 0) return null;
          return (
            <div key={stageIdx} className="flex items-start gap-3">
              <div className={`mt-0.5 shrink-0 w-20 text-center text-[11px] font-semibold px-2 py-1 rounded-full ${s.color} text-white`}>
                {s.short}
              </div>
              <div className="flex flex-wrap gap-1.5">
                {items.map(c => (
                  <button
                    key={c.id}
                    onClick={() => onSelect(c.id)}
                    className={`text-xs px-2.5 py-1 rounded-full border transition-all ${
                      selectedId === c.id
                        ? 'bg-blue-600 text-white border-blue-600'
                        : 'bg-gray-50 text-gray-700 border-gray-200 hover:border-blue-400'
                    }`}
                  >
                    {c.name}
                  </button>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function PriceTable({ complexes }) {
  const sorted = [...complexes].sort((a, b) => b.avgPrice.mid - a.avgPrice.mid);
  return (
    <div className="bg-white rounded-2xl border border-gray-100 p-4">
      <div className="text-sm font-bold text-gray-700 mb-3">💹 시세 비교 (억원)</div>
      <div className="overflow-x-auto scrollbar-hide">
        <table className="w-full text-xs">
          <thead>
            <tr className="text-gray-400 border-b border-gray-100">
              <th className="text-left py-2 font-medium">단지</th>
              <th className="text-right py-2 font-medium">최저</th>
              <th className="text-right py-2 font-medium">평균</th>
              <th className="text-right py-2 font-medium">최고</th>
              <th className="text-right py-2 font-medium">분담금</th>
              <th className="text-right py-2 font-medium">매물</th>
            </tr>
          </thead>
          <tbody>
            {sorted.map(c => (
              <tr key={c.id} className="border-b border-gray-50 hover:bg-gray-50">
                <td className="py-2 font-medium text-gray-800">
                  <div>{c.name}</div>
                  <div className="text-[10px] text-gray-400">{c.district}</div>
                </td>
                <td className="text-right py-2 text-gray-600">{c.avgPrice.low}</td>
                <td className="text-right py-2 font-bold text-blue-700">{c.avgPrice.mid}</td>
                <td className="text-right py-2 text-gray-600">{c.avgPrice.high}</td>
                <td className="text-right py-2 text-blue-600">{c.contribution.low}~{c.contribution.high}</td>
                <td className="text-right py-2 text-gray-500">{c.listings}건</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function App() {
  const [expandedId, setExpandedId] = useState(null);
  const [filterDistrict, setFilterDistrict] = useState("전체");
  const [filterStage, setFilterStage] = useState("전체");
  const [sortBy, setSortBy] = useState("stage");
  const [view, setView] = useState("cards");

  const districts = useMemo(() => ["전체", ...new Set(COMPLEXES.map(c => c.district))], []);
  const stageOptions = useMemo(() => {
    const used = new Set(COMPLEXES.map(c => c.stage));
    return ["전체", ...STAGES.filter((_, i) => used.has(i)).map(s => s.short)];
  }, []);

  const filtered = useMemo(() => {
    let list = [...COMPLEXES];
    if (filterDistrict !== "전체") list = list.filter(c => c.district === filterDistrict);
    if (filterStage !== "전체") {
      const idx = STAGES.findIndex(s => s.short === filterStage);
      list = list.filter(c => c.stage === idx);
    }
    if (sortBy === "stage")       list.sort((a, b) => b.stage - a.stage);
    if (sortBy === "price_asc")   list.sort((a, b) => a.avgPrice.mid - b.avgPrice.mid);
    if (sortBy === "price_desc")  list.sort((a, b) => b.avgPrice.mid - a.avgPrice.mid);
    if (sortBy === "listings")    list.sort((a, b) => b.listings - a.listings);
    return list;
  }, [filterDistrict, filterStage, sortBy]);

  const summary = useMemo(() => ({
    count: COMPLEXES.length,
    totalUnits: COMPLEXES.reduce((s, c) => s + c.totalUnits, 0),
    avgMid: (COMPLEXES.reduce((s, c) => s + c.avgPrice.mid, 0) / COMPLEXES.length).toFixed(1),
    totalListings: COMPLEXES.reduce((s, c) => s + c.listings, 0),
    mostAdvanced: [...COMPLEXES].sort((a,b)=>b.stage-a.stage)[0],
  }), []);

  const handleToggle = (id) => setExpandedId(prev => prev === id ? null : id);
  const handlePipelineSelect = (id) => {
    setExpandedId(id);
    setView("cards");
    setTimeout(() => {
      document.getElementById(`card-${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  };

  return (
    <div className="max-w-7xl mx-auto px-4 py-6">
      <div className="mb-6">
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h1 className="text-2xl font-bold text-gray-900">서울 재건축 핵심단지 대시보드</h1>
            <p className="text-sm text-gray-500 mt-1">
              {COMPLEXES.length}개 단지 · 업데이트 2025.05 · 단위: 억원
              <span className="ml-2 text-xs text-orange-500">※ 실거래가·매물은 참고용이며 직접 확인 필요</span>
            </p>
          </div>
          <div className="flex gap-2">
            <a href="https://land.naver.com/" target="_blank" rel="noopener noreferrer"
              className="text-xs px-3 py-1.5 rounded-lg bg-green-100 text-green-700 font-medium hover:bg-green-200 transition-colors">
              네이버 부동산 ↗
            </a>
            <a href="https://hogangnono.com/" target="_blank" rel="noopener noreferrer"
              className="text-xs px-3 py-1.5 rounded-lg bg-orange-100 text-orange-700 font-medium hover:bg-orange-200 transition-colors">
              호갱노노 ↗
            </a>
            <a href="https://asil.kr/" target="_blank" rel="noopener noreferrer"
              className="text-xs px-3 py-1.5 rounded-lg bg-blue-100 text-blue-700 font-medium hover:bg-blue-200 transition-colors">
              아실 ↗
            </a>
          </div>
        </div>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <SummaryCard label="추적 단지" value={`${summary.count}개`} sub={`총 ${summary.totalUnits.toLocaleString()}세대`} color="bg-gradient-to-br from-blue-50 to-blue-100 text-blue-900" />
        <SummaryCard label="평균 시세" value={`${summary.avgMid}억`} sub="단지별 평균 중위가" color="bg-gradient-to-br from-purple-50 to-purple-100 text-purple-900" />
        <SummaryCard label="전체 매물" value={`${summary.totalListings}건`} sub="조합원 매물 포함" color="bg-gradient-to-br from-teal-50 to-teal-100 text-teal-900" />
        <SummaryCard label="최선행 단지" value={summary.mostAdvanced.name.replace(/\s.*/, '')} sub={STAGES[summary.mostAdvanced.stage].short + " 단계"} color="bg-gradient-to-br from-rose-50 to-rose-100 text-rose-900" />
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 p-4 mb-5">
        <div className="text-xs font-semibold text-gray-500 mb-2">재건축 진행 단계</div>
        <div className="flex items-center gap-2 flex-wrap">
          {STAGES.map((s, i) => (
            <div key={i} className="flex items-center gap-1.5">
              <div className={`w-3 h-3 rounded-full ${s.color}`} />
              <span className="text-xs text-gray-600">{s.short}</span>
              {i < STAGES.length - 1 && <span className="text-gray-300 text-xs">→</span>}
            </div>
          ))}
        </div>
      </div>

      <div className="flex flex-wrap gap-3 mb-5 items-center justify-between">
        <div className="flex gap-2 flex-wrap">
          <div className="flex gap-1 bg-white rounded-xl border border-gray-200 p-1">
            {districts.map(d => (
              <button key={d} onClick={() => setFilterDistrict(d)}
                className={`text-xs px-3 py-1.5 rounded-lg transition-all ${filterDistrict === d ? 'bg-blue-600 text-white' : 'text-gray-600 hover:bg-gray-100'}`}>
                {d}
              </button>
            ))}
          </div>
          <div className="flex gap-1 bg-white rounded-xl border border-gray-200 p-1">
            {stageOptions.map(s => (
              <button key={s} onClick={() => setFilterStage(s)}
                className={`text-xs px-3 py-1.5 rounded-lg transition-all ${filterStage === s ? 'bg-purple-600 text-white' : 'text-gray-600 hover:bg-gray-100'}`}>
                {s}
              </button>
            ))}
          </div>
        </div>
        <div className="flex gap-2 items-center">
          <select value={sortBy} onChange={e => setSortBy(e.target.value)}
            className="text-xs px-3 py-2 rounded-xl border border-gray-200 bg-white text-gray-700 outline-none">
            <option value="stage">단계순</option>
            <option value="price_desc">시세 높은순</option>
            <option value="price_asc">시세 낮은순</option>
            <option value="listings">매물 많은순</option>
          </select>
          <div className="flex gap-1 bg-white rounded-xl border border-gray-200 p-1">
            {[["cards","카드뷰"], ["pipeline","단계뷰"], ["table","비교표"]].map(([v, label]) => (
              <button key={v} onClick={() => setView(v)}
                className={`text-xs px-3 py-1.5 rounded-lg transition-all ${view === v ? 'bg-gray-800 text-white' : 'text-gray-600 hover:bg-gray-100'}`}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {view === "cards" && (
        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
          {filtered.map(c => (
            <div key={c.id} id={`card-${c.id}`}>
              <ComplexCard c={c} expanded={expandedId === c.id} onToggle={() => handleToggle(c.id)} />
            </div>
          ))}
          {filtered.length === 0 && (
            <div className="col-span-3 text-center py-16 text-gray-400">필터 조건에 맞는 단지가 없습니다.</div>
          )}
        </div>
      )}
      {view === "pipeline" && (
        <PipelineView complexes={filtered} onSelect={handlePipelineSelect} selectedId={expandedId} />
      )}
      {view === "table" && (
        <PriceTable complexes={filtered} />
      )}

      <div className="mt-8 text-center text-xs text-gray-400">
        데이터 출처: 네이버 부동산 · 호갱노노 · 아실 · 각 조합 공시 / 직접 확인 후 투자 판단 바랍니다
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
