<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서울 재건축 핵심단지 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Noto Sans KR', sans-serif; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.45} }
    .blink { animation: blink 1.6s infinite; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="root"></div>

<script type="text/babel">

const STAGES = [
  { short: "구역지정",  color: "bg-gray-400"    },
  { short: "조합설립",  color: "bg-yellow-400"  },
  { short: "사업시행",  color: "bg-blue-500"    },
  { short: "관리처분",  color: "bg-violet-500"  },
  { short: "이주·철거", color: "bg-orange-400"  },
  { short: "착공",      color: "bg-red-400"     },
  { short: "준공",      color: "bg-emerald-500" },
];

const DISTRICT_COLORS = {
  "강남구": "bg-rose-100 text-rose-700",
  "서초구": "bg-purple-100 text-purple-700",
  "송파구": "bg-blue-100 text-blue-700",
  "성동구": "bg-emerald-100 text-emerald-700",
  "용산구": "bg-amber-100 text-amber-700",
  "마포구": "bg-teal-100 text-teal-700",
  "노원구": "bg-orange-100 text-orange-700",
};

// 시나리오2 적용 구역 (강남3구 + 용산)
const SCENARIO2_DISTRICTS = ["강남구", "서초구", "송파구", "용산구"];

const { useState, useMemo, useEffect } = React;

// ──────────────── 세금·비용 계산 함수 ────────────────

// 양도소득세 (1세대 1주택 기준)
function calcYangdoTax(buyPrice, sellPrice, holdYears, liveYears) {
  if (!buyPrice || !sellPrice || sellPrice <= 0) return 0;
  if (sellPrice <= 12) return 0; // 12억 이하 전액 비과세
  const profit = sellPrice - buyPrice;
  if (profit <= 0) return 0;
  // 과세 대상 비율: 12억 초과분만
  const taxableRatio = (sellPrice - 12) / sellPrice;
  let tp = profit * taxableRatio;
  // 장기보유특별공제 (보유 3년↑ + 거주 2년↑: 각 4%/년, 최대 80%)
  if (holdYears >= 3 && liveYears >= 2) {
    const ded = Math.min(Math.min(holdYears,10)*4 + Math.min(liveYears,10)*4, 80);
    tp *= (1 - ded / 100);
  }
  tp = Math.max(0, tp - 0.025); // 기본공제 250만원
  if (tp <= 0) return 0;
  // 누진세율 (억 단위)
  const bands = [[0.14,0.06,0],[0.50,0.15,0.14],[0.88,0.24,0.50],[1.50,0.35,0.88],
                 [3.00,0.38,1.50],[5.00,0.40,3.00],[10.0,0.42,5.00],[Infinity,0.45,10.0]];
  let tax = 0, rem = tp;
  for (const [lim, rate, prev] of bands) {
    if (rem <= 0) break;
    const band = lim === Infinity ? rem : Math.min(rem, lim - prev);
    tax += Math.min(rem, band) * rate;
    rem -= band;
  }
  return Math.round(tax * 1.1 * 10) / 10; // 지방소득세 10% 포함
}

// 취득세 (1주택 갈아타기 기준)
function calcAcquTax(price) {
  if (price <= 6) return Math.round(price * 0.01 * 10) / 10;
  if (price <= 9) {
    const rate = ((price - 6) * (2/3) + 1) / 100;
    return Math.round(price * rate * 10) / 10;
  }
  return Math.round(price * 0.03 * 10) / 10;
}

// 중개수수료 (법정 상한 기준)
function calcBroker(price, ratePct) {
  return Math.round(price * (ratePct / 100) * 10) / 10;
}

// ──────────────── 갭 트래커 ────────────────
function GapTracker({ complexes, myHome }) {
  const [loan,       setLoan]       = useState(myHome?.defaultLoan || 8.5);
  const [buyPrice,   setBuyPrice]   = useState(7.0);   // 금호파크힐스 취득가액
  const [holdYears,  setHoldYears]  = useState(5);     // 보유기간
  const [liveYears,  setLiveYears]  = useState(3);     // 거주기간
  const [brokerRate, setBrokerRate] = useState(0.5);   // 중개비율 %
  const [contribKey, setContribKey] = useState("mid"); // 분담금 low/mid/high
  const [showDetail, setShowDetail] = useState(false); // 비용 설정 패널

  const sellPrice = myHome?.latestPrice || 0;
  const netAsset  = parseFloat((sellPrice - loan).toFixed(1));

  // 매도 관련 고정비용
  const yangdoTax   = calcYangdoTax(buyPrice, sellPrice, holdYears, liveYears);
  const sellBroker  = sellPrice > 0 ? calcBroker(sellPrice, brokerRate) : 0;
  const sellCost    = parseFloat((yangdoTax + sellBroker).toFixed(1));

  const getRef = (c) => {
    const p = c.priceBySize.find(p => p.size === "84㎡") || c.priceBySize[c.priceBySize.length - 1];
    return p?.mid || 0;
  };

  const getContrib = (c) => {
    if (contribKey === "low")  return c.contribution.low;
    if (contribKey === "high") return c.contribution.high;
    return parseFloat(((c.contribution.low + c.contribution.high) / 2).toFixed(1));
  };

  // 시나리오별 갭 계산 (부대비용 포함)
  const calcAllGaps = (tp, district, contrib) => {
    const acquTax   = calcAcquTax(tp);
    const buyBroker = calcBroker(tp, brokerRate);
    const extraCost = parseFloat((sellCost + acquTax + buyBroker + contrib).toFixed(1));

    const loanS1 = tp >= 25 ? 2 : 0;
    const loanS2 = parseFloat((tp * 0.4).toFixed(1));
    const ltv3   = SCENARIO2_DISTRICTS.includes(district) ? 0.5 : 0.7;
    const loanS3 = parseFloat((tp * ltv3).toFixed(1));

    const baseGap = (loanAmt) => parseFloat((tp - netAsset - loanAmt).toFixed(1));
    const totalGap = (loanAmt) => parseFloat((baseGap(loanAmt) + extraCost).toFixed(1));

    return {
      acquTax, buyBroker, extraCost, ltv3,
      loanS1, loanS2, loanS3,
      base1: baseGap(loanS1), base2: baseGap(loanS2), base3: baseGap(loanS3),
      tot1:  totalGap(loanS1), tot2:  totalGap(loanS2), tot3:  totalGap(loanS3),
    };
  };

  const sorted = [...complexes].sort((a, b) => getRef(a) - getRef(b));

  const gapColor = (gap) => {
    if (gap <= 0)   return "text-emerald-600";
    if (gap <= 5)   return "text-amber-500";
    return "text-red-500";
  };

  const fmt = (v) => v > 0 ? `+${v}억` : `${v}억`;

  return (
    <div className="space-y-4">

      {/* ── 내 자산 현황 ── */}
      <div className="bg-white rounded-2xl border border-gray-100 p-4">
        <div className="text-sm font-bold text-gray-700 mb-3">🏠 내 자산 현황</div>
        <div className="grid grid-cols-3 gap-3">
          <div className="bg-gray-50 rounded-xl p-3 text-center">
            <div className="text-[11px] text-gray-500 mb-1">금호파크힐스 25평</div>
            <div className="text-xl font-bold text-gray-900">{sellPrice > 0 ? `${sellPrice}억` : "—"}</div>
            <div className="text-[10px] text-gray-400 mt-0.5">{myHome?.latestDate ? `${myHome.latestDate} 실거래` : "수집 중"}</div>
          </div>
          <div className="bg-blue-50 rounded-xl p-3 text-center">
            <div className="text-[11px] text-blue-500 mb-1">현재 융자</div>
            <div className="text-xl font-bold text-blue-700">{loan.toFixed(1)}억</div>
            <input type="range" min="0" max="15" step="0.1" value={loan}
              onChange={e => setLoan(parseFloat(e.target.value))}
              className="w-full mt-1.5 accent-blue-500" />
          </div>
          <div className={`rounded-xl p-3 text-center ${netAsset >= 0 ? "bg-emerald-50" : "bg-red-50"}`}>
            <div className={`text-[11px] mb-1 ${netAsset >= 0 ? "text-emerald-600" : "text-red-500"}`}>순자산</div>
            <div className={`text-xl font-bold ${netAsset >= 0 ? "text-emerald-700" : "text-red-600"}`}>{netAsset.toFixed(1)}억</div>
            <div className="text-[10px] text-gray-400 mt-0.5">실거래가 − 융자</div>
          </div>
        </div>
      </div>

      {/* ── 비용 설정 패널 ── */}
      <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
        <button onClick={() => setShowDetail(!showDetail)}
          className="w-full px-4 py-3 flex items-center justify-between text-sm font-bold text-gray-700 hover:bg-gray-50">
          <span>💸 비용 설정 (양도세·취득세·중개비·분담금)</span>
          <span className="text-gray-400 text-xs">{showDetail ? "▲ 접기" : "▼ 펼치기"}</span>
        </button>
        {showDetail && (
          <div className="px-4 pb-4 border-t border-gray-100 space-y-4">

            {/* 양도세 입력 */}
            <div className="pt-3">
              <div className="text-xs font-semibold text-gray-600 mb-2">📤 매도 비용 (금호파크힐스)</div>
              <div className="grid grid-cols-3 gap-2">
                <div>
                  <div className="text-[11px] text-gray-500 mb-1">취득가액</div>
                  <div className="flex items-center gap-1">
                    <input type="number" min="1" max="30" step="0.5" value={buyPrice}
                      onChange={e => setBuyPrice(parseFloat(e.target.value) || 0)}
                      className="w-full text-xs px-2 py-1.5 rounded-lg border border-gray-200 outline-none" />
                    <span className="text-xs text-gray-400 shrink-0">억</span>
                  </div>
                </div>
                <div>
                  <div className="text-[11px] text-gray-500 mb-1">보유기간</div>
                  <div className="flex items-center gap-1">
                    <input type="number" min="0" max="30" step="1" value={holdYears}
                      onChange={e => setHoldYears(parseInt(e.target.value) || 0)}
                      className="w-full text-xs px-2 py-1.5 rounded-lg border border-gray-200 outline-none" />
                    <span className="text-xs text-gray-400 shrink-0">년</span>
                  </div>
                </div>
                <div>
                  <div className="text-[11px] text-gray-500 mb-1">거주기간</div>
                  <div className="flex items-center gap-1">
                    <input type="number" min="0" max="30" step="1" value={liveYears}
                      onChange={e => setLiveYears(parseInt(e.target.value) || 0)}
                      className="w-full text-xs px-2 py-1.5 rounded-lg border border-gray-200 outline-none" />
                    <span className="text-xs text-gray-400 shrink-0">년</span>
                  </div>
                </div>
              </div>
              <div className="mt-2 grid grid-cols-2 gap-2">
                <div className="bg-orange-50 rounded-xl p-2.5">
                  <div className="text-[10px] text-orange-500">양도소득세 (지방세 포함)</div>
                  <div className="text-sm font-bold text-orange-700 mt-0.5">{yangdoTax}억</div>
                  {sellPrice <= 12 && <div className="text-[9px] text-orange-400">12억 이하 → 비과세</div>}
                  {sellPrice > 12 && holdYears >= 3 && liveYears >= 2 && (
                    <div className="text-[9px] text-orange-400">장기보유공제 {Math.min((Math.min(holdYears,10)+Math.min(liveYears,10))*4,80)}% 적용</div>
                  )}
                </div>
                <div className="bg-gray-50 rounded-xl p-2.5">
                  <div className="text-[10px] text-gray-500">매도 중개비 ({brokerRate}%)</div>
                  <div className="text-sm font-bold text-gray-700 mt-0.5">{sellBroker}억</div>
                  <div className="text-[9px] text-gray-400">매도비용 합계: {sellCost}억</div>
                </div>
              </div>
            </div>

            {/* 공통 설정 */}
            <div className="border-t border-gray-100 pt-3">
              <div className="text-xs font-semibold text-gray-600 mb-2">⚙️ 공통 설정</div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <div className="text-[11px] text-gray-500 mb-1.5">중개비율 (매도·매수 동일 적용)</div>
                  <div className="flex items-center gap-2">
                    <input type="range" min="0.3" max="0.9" step="0.05" value={brokerRate}
                      onChange={e => setBrokerRate(parseFloat(e.target.value))}
                      className="flex-1 accent-gray-500" />
                    <span className="text-xs font-bold text-gray-700 w-10 text-right">{brokerRate}%</span>
                  </div>
                </div>
                <div>
                  <div className="text-[11px] text-gray-500 mb-1.5">예상 분담금 기준</div>
                  <div className="flex gap-1">
                    {[["low","낙관"],["mid","중간"],["high","보수"]].map(([k,label]) => (
                      <button key={k} onClick={() => setContribKey(k)}
                        className={`flex-1 text-xs py-1.5 rounded-lg transition-all ${contribKey === k ? "bg-blue-600 text-white" : "bg-gray-100 text-gray-600"}`}>
                        {label}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ── 시나리오 설명 ── */}
      <div className="grid grid-cols-3 gap-2">
        {[
          ["violet","시나리오 1","현행 규제","25억↑ 대출 2억"],
          ["amber", "시나리오 2","규제 완화","LTV 40%"],
          ["emerald","시나리오 3","강남3구·용산 50%","그 외 LTV 70%"],
        ].map(([color, title, sub1, sub2]) => (
          <div key={title} className={`bg-${color}-50 rounded-2xl p-3`}>
            <div className={`text-xs font-bold text-${color}-700 mb-1`}>{title}</div>
            <div className={`text-[11px] text-${color}-600`}>{sub1}<br/><span className={`font-semibold text-${color}-800`}>{sub2}</span></div>
          </div>
        ))}
      </div>

      {/* ── 갭 테이블 ── */}
      <div className="bg-white rounded-2xl border border-gray-100 p-4">
        <div className="text-sm font-bold text-gray-700 mb-1">📊 단지별 실질 갭 분석</div>
        <div className="text-[11px] text-gray-400 mb-3">84㎡ 기준 · 부대비용 포함 · 단위: 억원</div>

        {sellPrice === 0 && (
          <div className="bg-orange-50 rounded-xl px-3 py-2 mb-3 text-xs text-orange-600">
            ⚠️ 금호파크힐스 실거래가 수집 전입니다. Actions 실행 후 자동 반영됩니다.
          </div>
        )}

        <div className="overflow-x-auto scrollbar-hide">
          <table className="w-full text-xs">
            <thead>
              <tr className="text-gray-400 border-b border-gray-100">
                <th className="text-left py-2 pl-1 font-medium">단지</th>
                <th className="text-right py-2 font-medium">시세</th>
                <th className="text-right py-2 font-medium text-gray-400">부대비용</th>
                <th className="text-right py-2 font-medium">
                  <div className="text-violet-600">S1 갭</div>
                  <div className="text-[9px] font-normal text-gray-300">부대비용 포함</div>
                </th>
                <th className="text-right py-2 font-medium">
                  <div className="text-amber-600">S2 갭</div>
                  <div className="text-[9px] font-normal text-gray-300">LTV 40%</div>
                </th>
                <th className="text-right py-2 pr-1 font-medium">
                  <div className="text-emerald-600">S3 갭</div>
                  <div className="text-[9px] font-normal text-gray-300">50/70%</div>
                </th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(c => {
                const tp     = getRef(c);
                const contrib = getContrib(c);
                const r       = calcAllGaps(tp, c.district, contrib);
                return (
                  <tr key={c.id} className="border-b border-gray-50 hover:bg-gray-50">
                    <td className="py-2.5 pl-1">
                      <div className="font-semibold text-gray-800">{c.name}</div>
                      <div className="text-[10px] text-gray-400">{c.district}</div>
                    </td>
                    <td className="text-right py-2.5 font-bold text-gray-700">{tp}억</td>
                    <td className="text-right py-2.5">
                      <div className="font-semibold text-gray-500">+{r.extraCost}억</div>
                      <div className="text-[9px] text-gray-300">
                        취득세{r.acquTax}+중개{r.buyBroker}<br/>
                        +분담{contrib}
                      </div>
                    </td>
                    <td className="text-right py-2.5">
                      <div className={`font-bold ${gapColor(r.tot1)}`}>{fmt(r.tot1)}</div>
                      <div className={`text-[9px] ${gapColor(r.base1)} opacity-60`}>{fmt(r.base1)} (기본)</div>
                    </td>
                    <td className="text-right py-2.5">
                      <div className={`font-bold ${gapColor(r.tot2)}`}>{fmt(r.tot2)}</div>
                      <div className={`text-[9px] ${gapColor(r.base2)} opacity-60`}>{fmt(r.base2)} (기본)</div>
                    </td>
                    <td className="text-right py-2.5 pr-1">
                      <div className={`font-bold ${gapColor(r.tot3)}`}>{fmt(r.tot3)}</div>
                      <div className="text-[9px] text-gray-300">LTV {(r.ltv3*100).toFixed(0)}%</div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* 부대비용 상세 범례 */}
        <div className="mt-3 bg-gray-50 rounded-xl p-3 text-[10px] text-gray-400 space-y-0.5">
          <div className="font-semibold text-gray-500 mb-1">부대비용 구성</div>
          <div>• 양도소득세 {yangdoTax}억 + 매도중개비 {sellBroker}억 (매도 비용)</div>
          <div>• 취득세 (단지별 시세 × 3%) + 매수중개비 (단지별 시세 × {brokerRate}%) (매수 비용)</div>
          <div>• 예상 분담금 {contribKey === "low" ? "낙관" : contribKey === "high" ? "보수" : "중간"} 기준</div>
          <div className="pt-1 text-gray-300">※ 양도세는 1세대1주택 비과세 요건 충족 기준. DSR·소득 요건에 따라 대출한도 변동 가능</div>
        </div>
      </div>
    </div>
  );
}

// ──────────────── 기존 컴포넌트 ────────────────
function StageProgress({ stage, stageStatus }) {
  return (
    <div className="flex items-center gap-0.5 mt-5 mb-0.5">
      {STAGES.map((s, i) => {
        const done   = i < stage || (i === stage && stageStatus === "completed");
        const active = i === stage && stageStatus === "in_progress";
        return (
          <React.Fragment key={i}>
            <div className={`relative flex-1 h-2 rounded-full transition-all ${done ? s.color : active ? s.color + " opacity-50 blink" : "bg-gray-200"}`}>
              {i === stage && (
                <span className={`absolute -top-5 left-1/2 -translate-x-1/2 text-[9px] font-bold whitespace-nowrap ${stageStatus === "completed" ? "text-emerald-600" : "text-blue-600 blink"}`}>
                  {stageStatus === "completed" ? "✓완료" : "▼진행"}
                </span>
              )}
            </div>
            {i < STAGES.length - 1 && <div className={`w-0.5 h-2 ${i < stage ? s.color : "bg-gray-200"}`} />}
          </React.Fragment>
        );
      })}
    </div>
  );
}

function StageBadge({ stage, stageStatus }) {
  const s = STAGES[stage];
  return (
    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold ${s.color} text-white`}>
      {stageStatus === "completed" ? "✓" : "⏳"} {s.short} {stageStatus === "completed" ? "완료" : "진행중"}
    </span>
  );
}

function PriceBySizeTable({ priceBySize, priceLastUpdated }) {
  return (
    <div className="mt-3">
      <div className="flex justify-between items-center mb-1.5">
        <span className="text-xs font-semibold text-gray-600">💹 평형별 최근 실거래가</span>
        <span className="text-[10px] text-orange-500 font-medium">기준 {priceLastUpdated} ※ 참고용</span>
      </div>
      <div className="rounded-xl overflow-hidden border border-gray-100">
        <table className="w-full text-xs">
          <thead>
            <tr className="bg-gray-50 text-gray-400">
              <th className="text-left px-3 py-1.5 font-medium">평형</th>
              <th className="text-right px-3 py-1.5 font-medium">최근 실거래가</th>
            </tr>
          </thead>

            {priceBySize.map((p, i) => (

function AllocationTable({ allocation }) {
  return (
    <div className="mt-3 bg-indigo-50 rounded-xl p-3">
      <div className="text-xs font-semibold text-indigo-700 mb-2">🏠 예상 배정 평형 가이드</div>
      {allocation.map((a, i) => (
        <div key={i} className="flex items-center justify-between">
          <span className="text-xs text-indigo-600">현재 <strong>{a.buySize}</strong> 매입 시</span>
          <span className="text-xs font-bold text-indigo-900">신규 {a.allocRange} 배정 가능</span>
        </div>
      ))}
      <p className="text-[9px] text-indigo-400 mt-2">※ 비례율·권리가액에 따라 달라짐</p>
    </div>
  );
}

function MilestoneSection({ milestones, currentStage, stageStatus }) {
  const shown = milestones.filter(m => m.stage > currentStage || (m.stage === currentStage && stageStatus === "in_progress"));
  if (!shown.length) return null;
  return (
    <div className="mt-3">
      <div className="text-xs font-semibold text-gray-600 mb-2">📅 향후 예상 일정</div>
      <div className="space-y-1.5">
        {shown.map((m, i) => (
          <div key={i} className="flex items-center justify-between bg-gray-50 rounded-lg px-3 py-2">
            <div className="flex items-center gap-2">
              <div className={`w-2 h-2 rounded-full shrink-0 ${STAGES[m.stage].color}`} />
              <span className="text-xs text-gray-700">{STAGES[m.stage].short}</span>
            </div>
            <span className="text-xs text-gray-500">{m.estimated} <span className="text-gray-400">(예상)</span></span>
          </div>
        ))}
      </div>
    </div>
  );
}

  const heroPrice = c.priceBySize.find(p => p.size === "84㎡") || c.priceBySize[c.priceBySize.length - 1];
  return (
    <div className={`bg-white rounded-2xl border border-gray-100 card-hover overflow-hidden ${expanded ? "ring-2 ring-blue-400" : ""}`}>

        <div className="flex items-start justify-between gap-2 mb-1">

          </div>
        </div>
        <StageProgress stage={c.stage} stageStatus={c.stageStatus} />
        <div className="flex justify-between mt-1">
          {STAGES.map((s, i) => (
            <span key={i} className={`text-[8px] text-center flex-1 ${i === c.stage ? c.stageStatus === "completed" ? "text-emerald-600 font-bold" : "text-blue-600 font-bold" : "text-gray-400"}`}>{s.short}</span>

              <div className="text-sm font-bold text-blue-700">{p.mid}<span className="text-[10px] font-normal text-gray-400">억</span></div>

          ))}
          <div className="shrink-0 bg-gray-50 rounded-xl px-2.5 py-1.5 text-center">
            <div className="text-[10px] text-gray-500">매물</div>
            <div className="text-sm font-bold text-gray-700">{c.listings}<span className="text-[10px] font-normal text-gray-400">건</span></div>
          </div>
          <div className="shrink-0 bg-blue-50 rounded-xl px-2.5 py-1.5 text-center">
            <div className="text-[10px] text-blue-500">분담금</div>
            <div className="text-sm font-bold text-blue-700">{c.contribution.low}~{c.contribution.high}<span className="text-[10px] font-normal">억</span></div>
          </div>
        </div>
        <div className="text-center mt-2 text-[10px] text-gray-400">{expanded ? "▲ 접기" : "▼ 상세 보기"}</div>
      </div>
      {expanded && (
        <div className="border-t border-gray-100 px-4 pb-5">
          <PriceBySizeTable priceBySize={c.priceBySize} priceLastUpdated={c.priceLastUpdated} />
          <div className="mt-4">
            <div className="text-xs font-semibold text-gray-600 mb-2">📋 최근 실거래</div>
            <div className="space-y-1.5">
              {c.recentTx.map((tx, i) => (
                <div key={i} className="flex items-center justify-between bg-gray-50 rounded-lg px-3 py-2">
                  <span className="text-xs text-gray-400">{tx.date}</span>
                  <span className="text-xs text-gray-600">{tx.size} · {tx.floor}</span>
                  <span className="text-sm font-bold text-gray-900">{tx.price}억</span>
                </div>
              ))}
            </div>
          </div>
          <AllocationTable allocation={c.allocation} />
          <div className="mt-3 bg-blue-50 rounded-xl p-3">
            <div className="text-xs font-semibold text-blue-700 mb-1">💰 예상 분담금</div>
            <div className="text-lg font-bold text-blue-800">{c.contribution.low}억 ~ {c.contribution.high}억</div>
            <div className="text-[10px] text-blue-600 mt-0.5">{c.contribution.note}</div>
          </div>
          <MilestoneSection milestones={c.milestones} currentStage={c.stage} stageStatus={c.stageStatus} />
          <div className="mt-3 grid grid-cols-3 gap-2">
            <div className="bg-gray-50 rounded-xl p-2.5 text-center">
              <div className="text-[10px] text-gray-400">현 단계</div>
              <div className="text-xs font-semibold text-gray-700 mt-0.5">{c.stageDate}</div>
            </div>
            <div className="bg-gray-50 rounded-xl p-2.5 text-center">
              <div className="text-[10px] text-gray-400">일반분양 비율</div>
              <div className="text-xs font-semibold text-gray-700 mt-0.5">{(c.generalSaleRatio * 100).toFixed(0)}%</div>
            </div>
            <div className="bg-gray-50 rounded-xl p-2.5 text-center">
              <div className="text-[10px] text-gray-400">신규 세대</div>
              <div className="text-xs font-semibold text-gray-700 mt-0.5">{c.newUnits.toLocaleString()}세대</div>
            </div>
          </div>
          <div className="mt-3 bg-amber-50 rounded-xl p-3">
            <div className="text-xs text-amber-800 leading-relaxed">📌 {c.note}</div>
          </div>
          <div className="mt-3 flex gap-2">
            <a href={c.links.naver} target="_blank" rel="noopener noreferrer" className="flex-1 text-center text-[11px] py-2 rounded-xl bg-green-500 text-white font-semibold hover:bg-green-600 transition-colors">네이버 부동산</a>
            <a href={c.links.hogangnono} target="_blank" rel="noopener noreferrer" className="flex-1 text-center text-[11px] py-2 rounded-xl bg-orange-500 text-white font-semibold hover:bg-orange-600 transition-colors">호갱노노</a>
            <a href={c.links.asil} target="_blank" rel="noopener noreferrer" className="flex-1 text-center text-[11px] py-2 rounded-xl bg-blue-500 text-white font-semibold hover:bg-blue-600 transition-colors">아실</a>
          </div>
        </div>
      )}
    </div>
  );
}

function SummaryCard({ label, value, sub, color }) {
  return (
    <div className={`rounded-2xl p-4 ${color}`}>
      <div className="text-xs font-medium opacity-70 mb-1">{label}</div>
      <div className="text-2xl font-bold">{value}</div>
      {sub && <div className="text-xs opacity-60 mt-0.5">{sub}</div>}
    </div>
  );
}

function PipelineView({ complexes, onSelect, selectedId }) {
  return (
    <div className="bg-white rounded-2xl border border-gray-100 p-4">
      <div className="text-sm font-bold text-gray-700 mb-4">📊 사업 단계별 현황</div>
      <div className="space-y-3">
        {STAGES.map((s, idx) => {
          const items = complexes.filter(c => c.stage === idx);
          if (!items.length) return null;
          return (
            <div key={idx} className="flex items-start gap-3">
              <div className={`shrink-0 w-20 text-center text-[11px] font-semibold px-2 py-1 rounded-full ${s.color} text-white mt-0.5`}>{s.short}</div>
              <div className="flex flex-wrap gap-1.5">
                {items.map(c => (
                  <button key={c.id} onClick={() => onSelect(c.id)}
                    className={`text-xs px-2.5 py-1 rounded-full border transition-all ${selectedId === c.id ? "bg-blue-600 text-white border-blue-600" : "bg-gray-50 text-gray-700 border-gray-200 hover:border-blue-400"}`}>
                    {c.name} <span className="ml-1 opacity-60">{c.stageStatus === "completed" ? "✓" : "⏳"}</span>
                  </button>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>

}

function PriceTable({ complexes }) {
  const sorted = [...complexes].sort((a, b) => {
    const aP = a.priceBySize.find(p => p.size === "84㎡") || a.priceBySize[a.priceBySize.length - 1];
    const bP = b.priceBySize.find(p => p.size === "84㎡") || b.priceBySize[b.priceBySize.length - 1];
    return bP.mid - aP.mid;
  });
  return (
    <div className="bg-white rounded-2xl border border-gray-100 p-4">
      <div className="text-sm font-bold text-gray-700 mb-3">💹 단지별 시세 비교 (억원)</div>
      <div className="overflow-x-auto scrollbar-hide">
        <table className="w-full text-xs">
          <thead>
            <tr className="text-gray-400 border-b border-gray-100">
              <th className="text-left py-2 font-medium">단지</th>
              <th className="text-right py-2 font-medium">42·59㎡</th>
              <th className="text-right py-2 font-medium">84㎡</th>
              <th className="text-right py-2 font-medium">105㎡+</th>
              <th className="text-right py-2 font-medium">분담금</th>
              <th className="text-right py-2 font-medium">매물</th>
            </tr>
          </thead>
          <tbody>
            {sorted.map(c => {
              const small = c.priceBySize.find(p => ["42㎡","59㎡"].includes(p.size));
              const mid84 = c.priceBySize.find(p => p.size === "84㎡");
              const large = c.priceBySize.find(p => ["105㎡","126㎡"].includes(p.size));
              return (
                <tr key={c.id} className="border-b border-gray-50 hover:bg-gray-50">
                  <td className="py-2 font-medium text-gray-800">
                    <div>{c.name}</div>
                    <div className="text-[10px] text-gray-400">{c.district}</div>
                  </td>
                  <td className="text-right py-2 text-gray-600">{small ? `${small.mid}억` : "—"}</td>
                  <td className="text-right py-2 font-bold text-blue-700">{mid84 ? `${mid84.mid}억` : "—"}</td>
                  <td className="text-right py-2 text-gray-600">{large ? `${large.mid}억` : "—"}</td>
                  <td className="text-right py-2 text-blue-600">{c.contribution.low}~{c.contribution.high}억</td>
                  <td className="text-right py-2 text-gray-500">{c.listings}건</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function LoadingScreen() {
  return (
    <div className="min-h-screen flex items-center justify-center">
      <div className="text-center">
        <div className="text-4xl mb-4">🏗️</div>
        <div className="text-gray-500 text-sm">단지 데이터 불러오는 중...</div>
      </div>
    </div>
  );
}

function App() {
  const [COMPLEXES, setCOMPLEXES] = useState([]);
  const [myHome, setMyHome]       = useState(null);
  const [loading, setLoading]     = useState(true);
  const [expandedId, setExpandedId]       = useState(null);
  const [filterDistrict, setFilterDistrict] = useState("전체");
  const [filterStage, setFilterStage]       = useState("전체");
  const [sortBy, setSortBy]                 = useState("stage");
  const [view, setView]                     = useState("cards");

  useEffect(() => {
    fetch('./data.json?v=' + Date.now())
      .then(r => r.json())
      .then(data => {
        // 새 구조 {"complexes":[], "myHome":{}} 또는 구 배열 모두 처리
        if (Array.isArray(data)) {
          setCOMPLEXES(data);
        } else {
          setCOMPLEXES(data.complexes || []);
          setMyHome(data.myHome || null);
        }
        setLoading(false);
      })
      .catch(() => setLoading(false));
  }, []);

  const districts    = useMemo(() => ["전체", ...new Set(COMPLEXES.map(c => c.district))], [COMPLEXES]);
  const stageOptions = useMemo(() => {
    const used = new Set(COMPLEXES.map(c => c.stage));
    return ["전체", ...STAGES.filter((_, i) => used.has(i)).map(s => s.short)];
  }, [COMPLEXES]);

  const filtered = useMemo(() => {
    let list = [...COMPLEXES];
    if (filterDistrict !== "전체") list = list.filter(c => c.district === filterDistrict);
    if (filterStage !== "전체") {
      const idx = STAGES.findIndex(s => s.short === filterStage);
      list = list.filter(c => c.stage === idx);
    }
    const getRef = c => (c.priceBySize.find(p => p.size === "84㎡") || c.priceBySize[c.priceBySize.length - 1]).mid;
    if (sortBy === "stage")      list.sort((a, b) => b.stage - a.stage);
    if (sortBy === "price_desc") list.sort((a, b) => getRef(b) - getRef(a));
    if (sortBy === "price_asc")  list.sort((a, b) => getRef(a) - getRef(b));
    if (sortBy === "listings")   list.sort((a, b) => b.listings - a.listings);
    return list;
  }, [COMPLEXES, filterDistrict, filterStage, sortBy]);

  const summary = useMemo(() => {
    if (!COMPLEXES.length) return null;
    const getRef = c => (c.priceBySize.find(p => p.size === "84㎡") || c.priceBySize[c.priceBySize.length - 1]).mid;
    return {
      count:        COMPLEXES.length,
      totalUnits:   COMPLEXES.reduce((s, c) => s + c.totalUnits, 0),
      avgMid:       (COMPLEXES.reduce((s, c) => s + getRef(c), 0) / COMPLEXES.length).toFixed(1),
      totalListings:COMPLEXES.reduce((s, c) => s + c.listings, 0),
      mostAdvanced: [...COMPLEXES].sort((a, b) => b.stage - a.stage)[0],
    };
  }, [COMPLEXES]);

  const handleToggle  = id => setExpandedId(prev => prev === id ? null : id);
  const handlePipeSel = id => {
    setExpandedId(id);
    setView("cards");
    setTimeout(() => document.getElementById(`card-${id}`)?.scrollIntoView({ behavior: "smooth", block: "center" }), 100);
  };

  if (loading) return <LoadingScreen />;
  if (!summary) return <div className="text-center py-20 text-red-500">데이터 로드 실패</div>;

  return (
    <div className="max-w-7xl mx-auto px-4 py-6">
      {/* 헤더 */}
      <div className="mb-5">
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h1 className="text-2xl font-bold text-gray-900">서울 재건축 핵심단지 대시보드</h1>
            <p className="text-sm text-gray-500 mt-1">{COMPLEXES.length}개 단지 · 실거래 기반 자동 업데이트</p>
          </div>
          <div className="flex gap-2">
            <a href="https://land.naver.com/" target="_blank" rel="noopener noreferrer" className="text-xs px-3 py-1.5 rounded-lg bg-green-100 text-green-700 font-medium hover:bg-green-200 transition-colors">네이버 부동산 ↗</a>
            <a href="https://hogangnono.com/" target="_blank" rel="noopener noreferrer" className="text-xs px-3 py-1.5 rounded-lg bg-orange-100 text-orange-700 font-medium hover:bg-orange-200 transition-colors">호갱노노 ↗</a>
            <a href="https://asil.kr/" target="_blank" rel="noopener noreferrer" className="text-xs px-3 py-1.5 rounded-lg bg-blue-100 text-blue-700 font-medium hover:bg-blue-200 transition-colors">아실 ↗</a>
          </div>
        </div>
      </div>

      {/* 요약 카드 */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        <SummaryCard label="추적 단지" value={`${summary.count}개`} sub={`총 ${summary.totalUnits.toLocaleString()}세대`} color="bg-gradient-to-br from-blue-50 to-blue-100 text-blue-900" />
        <SummaryCard label="84㎡ 평균" value={`${summary.avgMid}억`} sub="단지별 84㎡ 최근거래 평균" color="bg-gradient-to-br from-purple-50 to-purple-100 text-purple-900" />
        <SummaryCard label="전체 매물" value={`${summary.totalListings}건`} sub="조합원 매물 포함 추산" color="bg-gradient-to-br from-teal-50 to-teal-100 text-teal-900" />
        <SummaryCard label="최선행 단지" value={summary.mostAdvanced.name.split(" ")[0]} sub={`${STAGES[summary.mostAdvanced.stage].short} ${summary.mostAdvanced.stageStatus === "completed" ? "완료" : "진행중"}`} color="bg-gradient-to-br from-rose-50 to-rose-100 text-rose-900" />
      </div>

      {/* 단계 범례 */}
      <div className="bg-white rounded-2xl border border-gray-100 p-4 mb-5">
        <div className="text-xs font-semibold text-gray-500 mb-2">재건축 진행 단계</div>
        <div className="flex items-center gap-2 flex-wrap">
          {STAGES.map((s, i) => (
            <div key={i} className="flex items-center gap-1.5">
              <div className={`w-3 h-3 rounded-full ${s.color}`} />
              <span className="text-xs text-gray-600">{s.short}</span>
              {i < STAGES.length - 1 && <span className="text-gray-300 text-xs">→</span>}
            </div>
          ))}
        </div>
      </div>

      {/* 필터 + 뷰 선택 */}
      <div className="flex flex-wrap gap-3 mb-5 items-center justify-between">
        <div className="flex gap-2 flex-wrap">
          <div className="flex gap-1 bg-white rounded-xl border border-gray-200 p-1">
            {districts.map(d => (
              <button key={d} onClick={() => setFilterDistrict(d)}
                className={`text-xs px-3 py-1.5 rounded-lg transition-all ${filterDistrict === d ? "bg-blue-600 text-white" : "text-gray-600 hover:bg-gray-100"}`}>
                {d}
              </button>
            ))}
          </div>
          <div className="flex gap-1 bg-white rounded-xl border border-gray-200 p-1">
            {stageOptions.map(s => (
              <button key={s} onClick={() => setFilterStage(s)}
                className={`text-xs px-3 py-1.5 rounded-lg transition-all ${filterStage === s ? "bg-violet-600 text-white" : "text-gray-600 hover:bg-gray-100"}`}>
                {s}
              </button>
            ))}
          </div>
        </div>
        <div className="flex gap-2 items-center">
          <select value={sortBy} onChange={e => setSortBy(e.target.value)}
            className="text-xs px-3 py-2 rounded-xl border border-gray-200 bg-white text-gray-700 outline-none">
            <option value="stage">단계순</option>
            <option value="price_desc">시세 높은순</option>
            <option value="price_asc">시세 낮은순</option>
            <option value="listings">매물 많은순</option>
          </select>
          <div className="flex gap-1 bg-white rounded-xl border border-gray-200 p-1">
            {[["cards","카드뷰"],["pipeline","단계뷰"],["table","비교표"],["gap","갭트래커"]].map(([v, label]) => (
              <button key={v} onClick={() => setView(v)}
                className={`text-xs px-3 py-1.5 rounded-lg transition-all ${view === v ? v === "gap" ? "bg-emerald-600 text-white" : "bg-gray-800 text-white" : "text-gray-600 hover:bg-gray-100"}`}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* 뷰 렌더링 */}
      {view === "cards" && (
        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
          {filtered.map(c => (
            <div key={c.id} id={`card-${c.id}`}>
              <ComplexCard c={c} expanded={expandedId === c.id} onToggle={() => handleToggle(c.id)} />
            </div>
          ))}
          {!filtered.length && <div className="col-span-3 text-center py-16 text-gray-400">필터 조건에 맞는 단지가 없습니다.</div>}
        </div>
      )}
      {view === "pipeline" && <PipelineView complexes={filtered} onSelect={handlePipeSel} selectedId={expandedId} />}
      {view === "table"    && <PriceTable complexes={filtered} />}
      {view === "gap"      && <GapTracker complexes={COMPLEXES} myHome={myHome} />}

      <div className="mt-10 text-center text-xs text-gray-400 space-y-1">
        <div>데이터 출처: 국토교통부 실거래가 API · 네이버 부동산 · 호갱노노 · 아실 / 투자 전 직접 확인 필수</div>
        <div>단지 추가·수정: <strong>data.json</strong> 파일 편집</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
