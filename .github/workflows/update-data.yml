name: 실거래가 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install python-dateutil requests

      - name: 네이버 단지 ID 검증 및 자동 매핑
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, re, time

          # 미확인 ID 후보 → 실제 단지명 확인
          UNVERIFIED_IDS = [757, 492, 329, 186598]

          # 이미 검증된 ID (절대 변경 안 함)
          VERIFIED_MAP = {
              "잠실엘스":           6346,
              "리센츠":             6249,
              "트리지움":           6028,
              "레이크팰리스":       5957,
              "도곡렉슬":           3623,
              "개포자이프레지던스": 5235,
              "이촌한가람":         978,
              "개포우성7차":        867,
              "원효산호":           759,
              "서초그랑자이":       126726,
              "서초그랑자이":       126726,
              "도곡우성":           339,
              "올림픽훼미리타운":   89,
          }

          # 미확인 단지들 (매핑 필요)
          UNVERIFIED_COMPLEXES = ["서빙고 신동아","서초진흥","역삼럭키","디에이치방배",
                                   "잠실장미","잠실우성1·2·3차","올림픽선수기자촌",
                                   "성수동아","개포주공6·7단지","도곡한신","도곡대림"]

          def get_complex_name_from_naver(complex_id):
              """네이버 부동산 페이지에서 실제 단지명 추출"""
              url = f"https://new.land.naver.com/complexes/{complex_id}"
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
                  "Accept-Language": "ko-KR,ko;q=0.9",
              }
              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=10) as r:
                      html = r.read().decode("utf-8")
                  # <title> 태그에서 단지명 추출
                  m = re.search(r'<title[^>]*>([^<]+)</title>', html)
                  if m:
                      return m.group(1).strip()
              except Exception as e:
                  return f"오류: {e}"
              return None

          print("=== 미확인 ID 단지명 확인 ===")
          for cid in UNVERIFIED_IDS:
              name = get_complex_name_from_naver(cid)
              print(f"  ID {cid}: {name}")
              time.sleep(0.5)

          print("\n=== 검증된 ID 확인 (샘플) ===")
          for name, cid in list(VERIFIED_MAP.items())[:4]:
              title = get_complex_name_from_naver(cid)
              print(f"  {name} (ID:{cid}): {title}")
              time.sleep(0.5)

          PYEOF

      - name: 실거래가 업데이트 실행
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: python3 update_data.py

      - name: data.json 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "auto: 실거래가 업데이트 $(date +'%Y-%m-%d')"
          git push
