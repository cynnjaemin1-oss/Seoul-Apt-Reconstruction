name: 실거래가 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install requests python-dateutil

       - name: 아파트명 진단
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: |
          python - <<'PYEOF'
          import urllib.request, urllib.parse, json, os

          API_KEY = os.environ["MOLIT_API_KEY"]
          API_URL = "http://apis.data.go.kr/1613000/RTMSDataSvcAptTradeDev/getRTMSDataSvcAptTradeDev"

          def fetch(district_code, yyyymm):
              encoded_key = urllib.parse.quote(API_KEY, safe='')
              params = urllib.parse.urlencode({"LAWD_CD": district_code, "DEAL_YMD": yyyymm, "numOfRows": 1000, "pageNo": 1, "_type": "json"})
              url = f"{API_URL}?serviceKey={encoded_key}&{params}"
              try:
                  with urllib.request.urlopen(url, timeout=15) as r:
                      data = json.loads(r.read().decode("utf-8"))
                  items = data.get("response", {}).get("body", {}).get("items", {})
                  if not items: return []
                  item = items.get("item", [])
                  return [item] if isinstance(item, dict) else item
              except Exception as e:
                  print(f"  실패: {e}")
                  return []

          print("=== 송파구 장미/우성 검색 ===")
          for ym in ["202605","202604","202603","202602","202601","202512"]:
              items = fetch("11710", ym)
              names = sorted(set(i.get("aptNm","") for i in items if "장미" in i.get("aptNm","") or "우성" in i.get("aptNm","")))
              if names:
                  print(f"[{ym}] {names}")

          print("\n=== 성동구 신동아 상세 확인 ===")
          for ym in ["202605","202604"]:
              items = fetch("11200", ym)
              for i in items:
                  if "신동아" in i.get("aptNm",""):
                      print(f"  {ym} | {i.get('aptNm')} | {i.get('excluUseAr')}㎡ | {i.get('dealAmount')}만")
          PYEOF

      - name: 실거래가 업데이트 실행
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: python update_data.py

      - name: data.json 변경사항 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "auto: 실거래가 업데이트 $(date +'%Y-%m-%d')"
          git push
