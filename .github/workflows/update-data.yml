name: 실거래가 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install python-dateutil

      - name: 전 단지 API 매칭 진단
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, os, time
          from datetime import datetime
          from dateutil.relativedelta import relativedelta

          API_KEY = os.environ["MOLIT_API_KEY"]
          API_URL = "http://apis.data.go.kr/1613000/RTMSDataSvcAptTradeDev/getRTMSDataSvcAptTradeDev"

          DISTRICT_CODES = {
              "강남구":"11680","서초구":"11650","송파구":"11710",
              "성동구":"11200","용산구":"11140",
          }

          # update_data.py와 완전히 동일한 검색 규칙
          ALL_TARGETS = [
              ("잠실장미",        "11710", ["장미1","장미2"],                          [],                                               45,  145),
              ("잠실우성1·2·3차", "11710", ["우성아파트"],                             ["우성4차","가락우성","도곡우성"],                 75,  170),
              ("올림픽선수기자촌","11710", ["올림픽선수기자촌"],                       [],                                               75,  140),
              ("성수동아",        "11200", ["동아"],                                    ["동아그린","서울숲리버그린동아","신동아"],         50,  130),
              ("개포주공6·7단지", "11680", ["개포주공6단지","개포주공7단지"],          [],                                               30,   60),
              ("서빙고 신동아",   "11140", ["신동아"],                           [],                                               90, 215),
              ("도곡우성",        "11680", ["도곡우성"],                                [],                                               75,  120),
              ("서초진흥",        "11650", ["진흥아파트"],                                [],                                               98, 165),
              ("올림픽훼미리타운","11710", ["올림픽훼밀리타운","올림픽훼미리타운"],    [],                                               75,  140),
              ("개포우성7차",     "11680", [["우성7차","우성74"], [],                                               65,  90),
              ("원효산호",        "11140", ["산호"],                                    ["삼익산호","개포산호"],                           38, 110),
              ("도곡한신",        "11680", ["한신엠비씨"],                              [],                                               55,  115),
              ("도곡대림",        "11680", ["대림"],                                    ["대림역삼","대림아크로빌","청담대림","개포대림"], 82,   90),
              ("도곡삼익",        "11680", ["삼익"],                                    ["삼익대청","대청삼익","개포삼익"],               100,  112),
              ("잠실엘스",        "11710", ["잠실엘스"],                                [],                                               50,  135),
              ("리센츠",          "11710", ["리센츠"],                                  [],                                               50,  135),
              ("트리지움",        "11710", ["트리지움"],                                [],                                               50,  120),
              ("레이크팰리스",    "11710", ["레이크팰리스"],                            [],                                               75,  115),
              ("도곡렉슬",        "11680", ["도곡렉슬"],                                [],                                               80,  170),
              ("역삼럭키",        "11680", ["럭키"],                                [],                                              80, 130),
              ("이촌한가람",      "11140", ["한가람"],                                  [],                                               55, 120),
              ("디에이치방배",    "11650", ["디에이치방배"],                            [],                                               50,  120),
              ("개포자이프레지던스","11680",["개포자이프레지던스"],                    [],                                               50,  120),
              ("서초그랑자이",    "11650", ["서초그랑자이"],                            [],                                               50,  120),
          ]

          def fetch(dc, ym):
              key = urllib.parse.quote(API_KEY, safe='')
              p = urllib.parse.urlencode({"LAWD_CD":dc,"DEAL_YMD":ym,"numOfRows":1000,"pageNo":1,"_type":"json"})
              try:
                  with urllib.request.urlopen(f"{API_URL}?serviceKey={key}&{p}", timeout=15) as r:
                      d = json.loads(r.read().decode("utf-8"))
                  items = d.get("response",{}).get("body",{}).get("items",{})
                  if not items: return []
                  item = items.get("item",[])
                  return [item] if isinstance(item, dict) else item
              except: return []

          now = datetime.now()
          # 12개월 조회 (update_data.py와 동일)
          months = [(now - relativedelta(months=i)).strftime("%Y%m") for i in range(12)]
          districts = set(t[1] for t in ALL_TARGETS)
          print("데이터 로딩 중 (12개월)...")
          cache = {}
          for dc in districts:
              cache[dc] = {}
              for ym in months:
                  cache[dc][ym] = fetch(dc, ym)
                  time.sleep(0.2)

          print("\n=== 전 단지 API 매칭 진단 (최근 12개월) ===\n")
          ok_count = 0
          for name, dc, inc, exc, area_min, area_max in ALL_TARGETS:
              found_names = set()
              found_tx = []
              for ym in months:
                  for item in cache[dc].get(ym, []):
                      apt = str(item.get("aptNm","")).strip()
                      if not any(k in apt for k in inc): continue
                      if any(k in apt for k in exc): continue
                      area = float(item.get("excluUseAr", 0) or 0)
                      if not (area_min <= area <= area_max): continue
                      found_names.add(apt)
                      price_raw = str(item.get("dealAmount","0")).replace(",","").strip()
                      try:
                          price = round(int(price_raw)/10000, 1)
                          year = str(item.get("dealYear","")).strip()
                          month = str(item.get("dealMonth","")).strip().zfill(2)
                          found_tx.append(f"{year}.{month} {area}㎡ {price}억")
                      except: pass

              if found_names:
                  ok_count += 1
                  print(f"✅ {name}")
                  print(f"   매칭명: {', '.join(sorted(found_names))}")
                  print(f"   최근거래: {found_tx[0] if found_tx else '없음'}")
              else:
                  print(f"❌ {name} — 매칭 없음")
              print()

          print(f"결과: {ok_count}/{len(ALL_TARGETS)}개 단지 매칭 성공")
          PYEOF

      - name: 실거래가 업데이트 실행
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: python3 update_data.py

      - name: data.json 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "auto: 실거래가 업데이트 $(date +'%Y-%m-%d')"
          git push
