name: 실거래가 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install python-dateutil

      - name: 도곡한신·대림·삼익 API 이름 진단
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, os, time

          API_KEY = os.environ["MOLIT_API_KEY"]
          API_URL = "http://apis.data.go.kr/1613000/RTMSDataSvcAptTradeDev/getRTMSDataSvcAptTradeDev"

          def fetch(dc, ym):
              key = urllib.parse.quote(API_KEY, safe='')
              p = urllib.parse.urlencode({"LAWD_CD":dc,"DEAL_YMD":ym,"numOfRows":1000,"pageNo":1,"_type":"json"})
              try:
                  with urllib.request.urlopen(f"{API_URL}?serviceKey={key}&{p}", timeout=15) as r:
                      d = json.loads(r.read().decode("utf-8"))
                  items = d.get("response",{}).get("body",{}).get("items",{})
                  if not items: return []
                  item = items.get("item",[])
                  return [item] if isinstance(item, dict) else item
              except Exception as e:
                  print(f"실패: {e}"); return []

          print("=== 강남구 한신/대림/삼익 포함 아파트명 ===")
          for ym in ["202604","202603","202602","202601","202512","202511","202510"]:
              items = fetch("11680", ym)
              time.sleep(0.3)
              matches = [
                  f"aptNm={i.get('aptNm')} | 전용={i.get('excluUseAr')}㎡ | {i.get('dealAmount')}만"
                  for i in items
                  if any(k in str(i.get("aptNm","")) for k in ["한신","대림","삼익"])
              ]
              if matches:
                  print(f"[{ym}]")
                  for m in sorted(set(matches)): print(f"  {m}")
          PYEOF

      - name: 실거래가 업데이트 실행
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: python3 update_data.py

      - name: data.json 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "auto: 실거래가 업데이트 $(date +'%Y-%m-%d')"
          git push
