name: 실거래가 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install requests python-dateutil

      - name: API 응답 진단
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: |
          python - <<'EOF'
          import requests, os
          key = os.environ["MOLIT_API_KEY"]
          print(f"키 길이: {len(key)}자")
          print(f"키 앞 4자리: {key[:4]}")
          url = f"http://apis.data.go.kr/1613000/RTMSDataSvcAptTradeDevDev/getRTMSDataSvcAptTradeDev?serviceKey={key}&LAWD_CD=11710&DEAL_YMD=202604&numOfRows=5&pageNo=1&_type=json"
          resp = requests.get(url, timeout=15)
          print(f"HTTP 상태코드: {resp.status_code}")
          print(f"응답 내용:\n{resp.text[:500]}")
          EOF

      - name: 실거래가 업데이트 실행
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: python update_data.py

      - name: data.json 변경사항 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "auto: 실거래가 업데이트 $(date +'%Y-%m-%d')"
          git push
